<html>
    <body>
        <p>Sample for confirm box</p>
        <button onclick="myFunction()">Try it</button>
        <script>
            function myFunction(){
                if (confirm("Press a button!")==true) {
                    alert("You pressed OK!");
                } 
                else{
                    alert("You pressed Cancel!");
                }
            }
        </script>
    </body>
</html>
